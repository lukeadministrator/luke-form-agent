services:
  - type: web
    name: luke-form-agent
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      # Get a free key at https://console.groq.com/keys (email signup, no card)
      # and paste it in the Render dashboard (sync:false keeps it out of git).
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile
