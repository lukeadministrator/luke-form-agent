services:
  - type: web
    name: luke-form-agent
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      # Pin Python to a version with prebuilt wheels for our deps. 3.14 has no
      # pydantic-core wheel yet and would try (and fail) to compile from Rust.
      - key: PYTHON_VERSION
        value: "3.12.8"
      # Get a free key at https://console.groq.com/keys (email signup, no card)
      # and paste it in the Render dashboard (sync:false keeps it out of git).
      - key: GROQ_API_KEY
        sync: false
      # Best capability-per-dollar. Use moonshotai/kimi-k2-instruct for premium.
      - key: GROQ_MODEL
        value: openai/gpt-oss-120b
      - key: GROQ_FALLBACK_MODEL
        value: llama-3.3-70b-versatile
